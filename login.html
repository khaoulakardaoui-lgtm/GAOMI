<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — ORMVA/SM Bureau Informatique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 1rem auto;
    }
    .card-title-app {
      font-size: 0.95rem;
      color: #6c757d;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">

        <div class="text-center mb-4">
          <div class="login-logo bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width:70px;height:70px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="#0d6efd" viewBox="0 0 16 16">
              <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4Zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10Z"/>
            </svg>
          </div>
          <h1 class="h5 fw-bold mb-1">ORMVA/SM — Bureau Informatique</h1>
          <p class="card-title-app mb-0">Gestion des Appels d'Offres et Marchés Informatiques</p>
        </div>

        <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="login" class="form-label">Identifiant</label>
            <input type="text" class="form-control" id="login" name="login" placeholder="Votre login" required autofocus>
          </div>

          <div class="mb-3">
            <label for="mot_de_passe" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe" placeholder="Votre mot de passe" required>
          </div>

          <button type="submit" class="btn btn-primary w-100" id="submitBtn">
            <span id="submitText">Se connecter</span>
            <span id="submitSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
          </button>
        </form>

      </div>
    </div>
    <p class="text-center text-muted small mt-3 mb-0">&copy; 2026 ORMVA/SM — Usage interne uniquement</p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitSpinner = document.getElementById('submitSpinner');

    function afficherErreur(message) {
      alertBox.textContent = message;
      alertBox.classList.remove('d-none');
    }

    function masquerErreur() {
      alertBox.classList.add('d-none');
    }

    function setChargement(actif) {
      submitBtn.disabled = actif;
      submitSpinner.classList.toggle('d-none', !actif);
      submitText.textContent = actif ? 'Connexion en cours...' : 'Se connecter';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      masquerErreur();

      const login = document.getElementById('login').value.trim();
      const mot_de_passe = document.getElementById('mot_de_passe').value;

      if (!login || !mot_de_passe) {
        afficherErreur('Veuillez saisir votre identifiant et votre mot de passe.');
        return;
      }

      setChargement(true);

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, mot_de_passe })
        });

        const data = await response.json();

        if (!response.ok) {
          afficherErreur(data.message || 'Identifiants incorrects.');
          setChargement(false);
          return;
        }

        // Connexion réussie -> redirection (selon profil géré côté serveur)
        window.location.href = data.redirect || '/dashboard.html';

      } catch (error) {
        console.error(error);
        afficherErreur('Impossible de contacter le serveur. Veuillez réessayer.');
        setChargement(false);
      }
    });
  </script>

</body>
</html>
