<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — ORMVA/SM Bureau Informatique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand">ORMVA/SM — Bureau Informatique</span>
      <div class="d-flex align-items-center">
        <span id="userLabel" class="text-white me-3 small"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Déconnexion</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="alert alert-success">
      Connexion réussie ✅ — Ceci est un placeholder. Les pages Référentiels, Fournisseurs,
      Appels d'offres, Marchés, etc. seront ajoutées lors des phases suivantes du plan.
    </div>
  </div>

  <script>
    // Vérifie la session et affiche l'utilisateur connecté
    fetch('/auth/me')
      .then(res => {
        if (!res.ok) { window.location.href = '/login.html'; return; }
        return res.json();
      })
      .then(data => {
        if (data && data.user) {
          document.getElementById('userLabel').textContent =
            `${data.user.nom} (${data.user.profil})`;
        }
      })
      .catch(() => window.location.href = '/login.html');

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const res = await fetch('/auth/logout', { method: 'POST' });
      const data = await res.json();
      window.location.href = data.redirect || '/login.html';
    });
  </script>

</body>
</html>
